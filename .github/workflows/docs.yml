name: Docs

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Dryad
        run: |
          curl -L https://github.com/somesocks/dryad/releases/download/release-0.26.2/dryad-0.26.2-install.sh | sh
          echo "$HOME/bin" >> "$GITHUB_PATH"

      - name: Build docs
        run: dryad root build dyd/roots/libraries/dhall-codegen-docs --scope=none

      - name: Prepare Pages artifact
        run: |
          mkdir -p _site
          cp -R dyd/sprouts/libraries/dhall-codegen-docs/dyd/dependencies/stem/dyd/assets/. _site/

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
